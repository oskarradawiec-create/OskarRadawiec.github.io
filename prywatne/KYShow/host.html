<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Prowadzący</title>

</head>
<body>
<div class="container">
    <h1>Prowadzący</h1>

    <canvas id="wheel" width="400" height="400"></canvas>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>

<script src="js/firebase.js"></script>

<script src="js/host.js"></script>

</html>
